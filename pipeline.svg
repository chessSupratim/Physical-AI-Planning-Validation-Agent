<svg width="100%" viewBox="0 0 680 1560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Physical AI Planning Agent — full pipeline with three-stage obstacle detection</title>
<desc>End-to-end flow: image upload, two input modes (prompt and click), localization, three-stage obstacle detection (Gemini VLM, OWL-ViT, IoU NMS merge), deterministic navigation, mandatory reasoning, and outputs, with final position fed back into session context.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="1560" fill="#FFFFFF"/>

<g>
<rect x="250" y="30" width="180" height="44" rx="8" fill="#E8E6DD" stroke="#5F5E5A" stroke-width="1"/>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Upload image</text>
</g>
<line x1="340" y1="74" x2="340" y2="96" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="240" y="96" width="200" height="56" rx="8" fill="#E8E6DD" stroke="#5F5E5A" stroke-width="1"/>
<text x="340" y="114" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Choose input mode</text>
<text x="340" y="134" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">radio: prompt | click</text>
</g>

<line x1="270" y1="152" x2="170" y2="192" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="410" y1="152" x2="510" y2="192" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="192" width="220" height="56" rx="8" fill="#DCD9F5" stroke="#534AB7" stroke-width="1"/>
<text x="170" y="210" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2B2566">Mode A — typed prompt</text>
<text x="170" y="230" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">natural-language instruction</text>
</g>

<g>
<rect x="400" y="192" width="220" height="56" rx="8" fill="#C9EFE2" stroke="#0F6E56" stroke-width="1"/>
<text x="510" y="210" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#064334">Mode B — click points</text>
<text x="510" y="230" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#085041">start (red) + goal (yellow)</text>
</g>

<line x1="170" y1="248" x2="170" y2="284" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="284" width="220" height="56" rx="8" fill="#DCD9F5" stroke="#534AB7" stroke-width="1"/>
<text x="170" y="302" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2B2566">LLM intent parser</text>
<text x="170" y="322" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">extracts source, target</text>
</g>
<line x1="170" y1="340" x2="170" y2="376" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="376" width="220" height="56" rx="8" fill="#DCD9F5" stroke="#534AB7" stroke-width="1"/>
<text x="170" y="394" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2B2566">Router per field</text>
<text x="170" y="414" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">object→OWL-ViT, dir→heuristic</text>
</g>
<line x1="170" y1="432" x2="170" y2="468" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="468" width="220" height="56" rx="8" fill="#DCD9F5" stroke="#534AB7" stroke-width="1"/>
<text x="170" y="486" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2B2566">HSV cross-check</text>
<text x="170" y="506" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">reject off-object points</text>
</g>

<line x1="170" y1="524" x2="170" y2="568" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="248" x2="510" y2="568" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="210" y="568" width="260" height="56" rx="8" fill="#E8E6DD" stroke="#5F5E5A" stroke-width="1"/>
<text x="340" y="586" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">start_pos, goal_pos</text>
<text x="340" y="606" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">two pixel coordinates</text>
</g>
<line x1="340" y1="624" x2="340" y2="660" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="660" width="600" height="400" rx="20" fill="#FBEDE6" stroke="#993C1D" stroke-width="1"/>
<text x="60" y="686" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#5E2410">Obstacle detection</text>
<text x="60" y="704" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#712B13">localization/obstacles.py · once per run</text>

<g>
<rect x="80" y="724" width="520" height="92" rx="12" fill="#FAE3C0" stroke="#854F0B" stroke-width="1"/>
<text x="100" y="748" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#523005">Stage A — Gemini VLM sees the image</text>
<text x="100" y="771" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#633806">→ obstacle names (e.g. "cardboard box")</text>
<text x="100" y="789" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#633806">→ approximate boxes (0–1000 scale)</text>
<text x="100" y="807" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#633806">→ floor_y_top (y where floor begins)</text>
</g>
<line x1="340" y1="816" x2="340" y2="850" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="80" y="850" width="520" height="80" rx="12" fill="#D2E5F8" stroke="#185FA5" stroke-width="1"/>
<text x="100" y="874" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#08365F">Stage B — OWL-ViT queried with Gemini's names</text>
<text x="100" y="897" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#0C447C">→ tight, pixel-accurate bounding boxes</text>
<text x="100" y="915" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#0C447C">open-vocabulary detector grounds each name</text>
</g>
<line x1="340" y1="930" x2="340" y2="964" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="80" y="964" width="520" height="80" rx="12" fill="#C9EFE2" stroke="#0F6E56" stroke-width="1"/>
<text x="100" y="988" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#064334">Stage C — merge + IoU NMS</text>
<text x="100" y="1011" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#085041">Gemini boxes (score 0.5) + OWL-ViT boxes</text>
<text x="100" y="1029" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#085041">→ deduplicated, clean obstacle list</text>
</g>

<line x1="340" y1="1060" x2="340" y2="1096" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="200" y="1096" width="280" height="56" rx="8" fill="#E8E6DD" stroke="#5F5E5A" stroke-width="1"/>
<text x="340" y="1114" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">obstacle_boxes + floor_y_top</text>
<text x="340" y="1134" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">clean list passed to navigation</text>
</g>
<line x1="340" y1="1152" x2="340" y2="1188" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="170" y="1188" width="340" height="72" rx="8" fill="#D2E5F8" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="1210" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#08365F">Navigation core (deterministic)</text>
<text x="340" y="1230" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#0C447C">hop steps, full-line look-ahead</text>
<text x="340" y="1246" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#0C447C">commit detour / A* around blocks</text>
</g>
<line x1="340" y1="1260" x2="340" y2="1296" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="210" y="1296" width="260" height="56" rx="8" fill="#D2E5F8" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="1314" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#08365F">LLM reasoning (mandatory)</text>
<text x="340" y="1334" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#0C447C">explains the plan</text>
</g>
<line x1="340" y1="1352" x2="340" y2="1388" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="170" y="1388" width="340" height="72" rx="8" fill="#D7E9BD" stroke="#3B6D11" stroke-width="1"/>
<text x="340" y="1410" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1E3D08">Outputs</text>
<text x="340" y="1430" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#27500A">trajectory GIF, trail still, cost table</text>
<text x="340" y="1446" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#27500A">log.json + reasoning text</text>
</g>

<line x1="510" y1="1424" x2="600" y2="1424" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M600 1424 L656 1424 L656 124 L440 124" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<text x="654" y="770" text-anchor="middle" transform="rotate(90 654 770)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">final position → session_state</text>
</svg>
